<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#000000" />
    <title>Todo</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "@desert-ant-labs/emo": "https://esm.sh/@desert-ant-labs/emo@1"
        }
      }
    </script>
  </head>
  <body>
    <!-- Main list screen -->
    <div class="screen" id="listScreen">
      <header class="nav">
        <h1 class="nav-title">Todo</h1>
        <button class="nav-add" id="addButton" aria-label="Add Todo">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round">
            <path d="M12 5v14M5 12h14" />
          </svg>
        </button>
      </header>

      <main class="content">
        <ul class="list" id="todoList"></ul>

        <div class="empty" id="emptyState">
          <div class="empty-emoji">✨</div>
          <div class="empty-title">No todos yet</div>
          <div class="empty-subtitle">Use + to add one</div>
        </div>
      </main>
    </div>

    <!-- Add modal -->
    <div class="sheet-backdrop" id="sheetBackdrop" hidden></div>
    <div class="sheet" id="addSheet" role="dialog" aria-modal="true" aria-label="New Todo" hidden>
      <header class="sheet-nav">
        <h2 class="sheet-title">New Todo</h2>
        <button class="sheet-close" id="cancelButton" aria-label="Close">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <path d="M6 6l12 12M18 6L6 18" />
          </svg>
        </button>
      </header>

      <div class="sheet-body">
        <div class="emoji-badge" id="emojiBadge">
          <span class="emoji-badge-emoji" id="badgeEmoji">✨</span>
        </div>

        <input
          class="title-field"
          id="titleField"
          type="text"
          placeholder="What's on your list?"
          autocomplete="off"
          autocapitalize="sentences"
          enterkeyhint="done"
        />
      </div>

      <footer class="sheet-actions">
        <button class="btn btn-ghost" id="cancelButton2">Cancel</button>
        <button class="btn btn-primary" id="saveButton" disabled>Add todo</button>
      </footer>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
